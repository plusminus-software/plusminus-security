name: Release
run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
      && format('Release {0} @{1}', github.ref_name, github.sha)
      || '' }}

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      module:
        description: 'Specific module to deploy (leave empty for all)'
        required: false
        type: choice
        options:
          - ""
          - "plusminus-security"
          - "plusminus-security-core"
          - "plusminus-authentication"
          - "plusminus-authorization"
          - "plusminus-jwt"
          - "plusminus-login"
          - "plusminus-user"

jobs:
  release:
    uses: plusminus-software/plusminus-workflows/.github/workflows/maven-central-release.yml@main
    with:
      java-version: '8'
      module: ${{ github.event.inputs.module }}
    secrets: inherit