name: Release

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Specific module to deploy (leave empty for all)'
        required: false
        type: choice
        options:
          - ""
          - "plusminus-security"
          - "plusminus-security-parent"
          - "plusminus-security-core"
          - "plusminus-authentication"
          - "plusminus-authorization"
          - "plusminus-jwt"
          - "plusminus-login"
          - "plusminus-user"

jobs:
  release:
    uses: plusminus-software/plusminus-opensource/.github/workflows/maven-central-release.yml@main
    with:
      java-version: '8'
      module: ${{ github.event.inputs.module || '' }}
    secrets: inherit